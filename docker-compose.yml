version: '3.9'

services:
  backend:
    build: .
    container_name: smart_library_backend
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: development
      PORT: 5000
      DATABASE_URL: postgresql://postgres:password@db:5432/smart_library
      REDIS_URL: redis://redis:6379
      JWT_SECRET: supersecretkey
      FINE_PER_DAY: 5
      LOAN_PERIOD_DAYS: 14
    depends_on:
      - db
      - redis
    command: sh -c "npm run prisma:generate && npm run prisma:push && npm start"

  db:
    image: postgres:16
    container_name: smart_library_db
    environment:
      POSTGRES_DB: smart_library
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: smart_library_redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
