name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  docker-ci-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t smart-library-backend:${{ github.sha }} .

      - name: Run backend container
        run: |
          docker run -d --name smart-library-ci \
            -p 5000:5000 \
            -e NODE_ENV=test \
            -e PORT=5000 \
            -e DATABASE_URL='postgresql://postgres:postgres@localhost:5432/smart_library?schema=public' \
            -e REDIS_URL='redis://localhost:6379' \
            -e JWT_SECRET='ci-secret-key' \
            -e FINE_PER_DAY=5 \
            -e LOAN_PERIOD_DAYS=14 \
            smart-library-backend:${{ github.sha }}

      - name: Health check
        run: |
          for i in {1..20}; do
            if curl -fsS http://localhost:5000/health; then
              exit 0
            fi
            sleep 2
          done
          echo "Container failed health check. Logs:" && docker logs smart-library-ci
          exit 1

      - name: Cleanup container
        if: always()
        run: docker rm -f smart-library-ci || true
